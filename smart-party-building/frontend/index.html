<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧党建智能体 - 演示界面</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }
  .app { max-width: 1100px; margin: 0 auto; padding: 20px; }
  
  /* 顶部导航 */
  .header { background: linear-gradient(135deg, #c62828, #d32f2f); color: #fff; padding: 20px 30px; border-radius: 12px; margin-bottom: 24px; }
  .header h1 { font-size: 22px; margin-bottom: 4px; }
  .header p { opacity: .85; font-size: 13px; }
  .header .status { float: right; font-size: 13px; margin-top: 8px; }
  .badge-online { color: #81c784; } .badge-offline { color: #ff8a80; }
  
  /* 标签导航 */
  .tabs { display: flex; gap: 4px; background: #fff; border-radius: 10px; padding: 4px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; transition: all .2s; border: none; background: none; }
  .tab:hover { background: #f5f5f5; }
  .tab.active { background: #c62828; color: #fff; }
  
  /* 卡片 */
  .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .card h3 { font-size: 16px; margin-bottom: 16px; color: #c62828; }
  
  /* 表单 */
  .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .form-row label { min-width: 70px; font-size: 13px; color: #666; line-height: 36px; }
  .form-row input, .form-row select, .form-row textarea { flex: 1; min-width: 150px; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; outline: none; transition: border .2s; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #c62828; }
  .form-row textarea { min-height: 60px; resize: vertical; }
  
  .btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; }
  .btn-primary { background: #c62828; color: #fff; }
  .btn-primary:hover { background: #b71c1c; }
  .btn-primary:disabled { background: #e0e0e0; color: #999; cursor: not-allowed; }
  .btn-sm { padding: 4px 12px; font-size: 12px; }
  .btn-outline { background: #fff; color: #c62828; border: 1px solid #c62828; }
  .btn-outline:hover { background: #fff5f5; }
  
  /* 输出区 */
  .output { background: #fafafa; border: 1px solid #e8e8e8; border-radius: 8px; padding: 16px; margin-top: 12px; font-size: 13px; min-height: 50px; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; line-height: 1.7; }
  .output-empty { color: #bbb; }
  .output .loading { color: #c62828; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: .3; } }
  .output .error { color: #d32f2f; }
  
  /* 聊天样式 */
  .chat-box { height: 350px; overflow-y: auto; padding: 12px; background: #f5f5f5; border-radius: 8px; margin-bottom: 12px; }
  .chat-msg { margin-bottom: 12px; display: flex; }
  .chat-msg.user { justify-content: flex-end; }
  .chat-msg .bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
  .chat-msg.user .bubble { background: #c62828; color: #fff; border-bottom-right-radius: 4px; }
  .chat-msg.assistant .bubble { background: #fff; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
  .chat-msg .time { font-size: 11px; color: #999; margin-top: 4px; }
  .chat-msg.user .time { text-align: right; }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input-row input { flex: 1; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 20px; font-size: 13px; outline: none; }
  .chat-input-row input:focus { border-color: #c62828; }
  
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Markdown 简单样式 */
  .output h1, .output h2, .output h3, .output h4 { margin: 12px 0 6px; color: #333; }
  .output h1 { font-size: 18px; } .output h2 { font-size: 16px; } .output h3 { font-size: 14px; }
  .output p { margin: 6px 0; }
  .output ul, .output ol { margin: 6px 0; padding-left: 20px; }
  .output li { margin: 3px 0; }
  .output strong { color: #c62828; }
  .output hr { margin: 12px 0; border: none; border-top: 1px solid #e0e0e0; }
  .output blockquote { border-left: 3px solid #c62828; padding-left: 12px; color: #666; margin: 8px 0; }
  .output table { border-collapse: collapse; margin: 8px 0; width: 100%; }
  .output th, .output td { border: 1px solid #e0e0e0; padding: 6px 10px; text-align: left; font-size: 12px; }
  .output th { background: #fafafa; font-weight: 600; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- 顶部 -->
  <div class="header">
    <span class="status" id="statusBadge"><span class="badge-offline">●</span> 检查中...</span>
    <h1>🏛️ 智慧党建智能体</h1>
    <p>基于 LangChain + DeepSeek 的智能演示系统</p>
  </div>

  <!-- 标签 -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('chat')">💬 智能查询</button>
    <button class="tab" onclick="switchTab('recommend')">🎯 学习推荐</button>
    <button class="tab" onclick="switchTab('report')">📊 生成报告</button>
  </div>

  <!-- 聊天标签 -->
  <div id="tab-chat" class="tab-content active">
    <div class="card">
      <h3>💬 党建知识查询</h3>
      <div class="form-row">
        <label>党员ID</label>
        <input type="number" id="chatMemberId" value="1" min="1" style="max-width:100px">
      </div>
      <div class="chat-box" id="chatBox">
        <div class="chat-msg assistant">
          <div class="bubble">你好！我是智慧党建助手，可以回答党建相关问题。试试问我：</div>
        </div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="输入你的问题，例如：请介绍一下三会一课制度" onkeydown="if(event.key==='Enter') sendChat()">
        <button class="btn btn-primary" onclick="sendChat()" id="chatBtn">发送</button>
      </div>
    </div>
  </div>

  <!-- 推荐标签 -->
  <div id="tab-recommend" class="tab-content">
    <div class="card">
      <h3>🎯 个性化学习推荐</h3>
      <div class="form-row">
        <label>党员ID</label>
        <input type="number" id="recMemberId" value="1" min="1" style="max-width:100px">
        <label>推荐数量</label>
        <input type="number" id="recTopK" value="5" min="1" max="20" style="max-width:80px">
        <label>分类</label>
        <select id="recCategory" style="max-width:130px">
          <option value="">全部</option>
          <option value="党史">党史</option>
          <option value="理论">理论</option>
          <option value="政策">政策</option>
          <option value="法规">法规</option>
          <option value="党务">党务</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="getRecommend()">获取推荐</button>
      <div class="output output-empty" id="recOutput">点击"获取推荐"查看结果</div>
    </div>
  </div>

  <!-- 报告标签 -->
  <div id="tab-report" class="tab-content">
    <div class="card">
      <h3>📊 生成学习报告</h3>
      <div class="form-row">
        <label>报告类型</label>
        <select id="rptType">
          <option value="personal">个人学习报告</option>
          <option value="department">支部学习报告</option>
          <option value="organization">组织分析报告</option>
        </select>
        <label>党员ID</label>
        <input type="number" id="rptMemberId" value="1" min="1" style="max-width:100px">
      </div>
      <div class="form-row">
        <label>开始日期</label>
        <input type="date" id="rptStart" value="2026-01-01" style="max-width:160px">
        <label>结束日期</label>
        <input type="date" id="rptEnd" value="2026-07-23" style="max-width:160px">
      </div>
      <button class="btn btn-primary" onclick="generateReport()">生成报告</button>
      <div class="output output-empty" id="rptOutput">点击"生成报告"查看结果</div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';

// ====== 健康检查 ======
async function checkHealth() {
  const badge = document.getElementById('statusBadge');
  try {
    const r = await fetch(`${API}/health`);
    if (r.ok) { badge.innerHTML = '<span class="badge-online">●</span> 服务正常'; }
    else { badge.innerHTML = '<span class="badge-offline">●</span> 异常'; }
  } catch { badge.innerHTML = '<span class="badge-offline">●</span> 无法连接'; }
}
checkHealth();

// ====== 标签切换 ======
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  event.target.classList.add('active');
}

// ====== 智能查询（聊天） ======
async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  const memberId = document.getElementById('chatMemberId').value;
  const btn = document.getElementById('chatBtn');

  // 添加用户消息
  addChatMsg('user', msg);
  input.value = '';
  btn.disabled = true;
  btn.textContent = '思考中...';

  // 添加 loading
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'chat-msg assistant';
  loadingDiv.id = 'chatLoading';
  loadingDiv.innerHTML = '<div class="bubble"><span class="loading">⏳ 正在思考...</span></div>';
  document.getElementById('chatBox').appendChild(loadingDiv);
  scrollChat();

  try {
    const r = await fetch(`${API}/api/v1/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: msg, member_id: parseInt(memberId) || null })
    });
    const data = await r.json();
    document.getElementById('chatLoading').remove();
    addChatMsg('assistant', data.answer || '（无回答）');
    if (data.sources && data.sources.length) {
      addChatMsg('assistant', `📎 参考来源: ${data.sources.length} 个`);
    }
  } catch (err) {
    document.getElementById('chatLoading').remove();
    addChatMsg('assistant', `❌ 请求失败: ${err.message}`);
  }
  btn.disabled = false;
  btn.textContent = '发送';
}

function addChatMsg(role, content) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  const time = new Date().toLocaleTimeString();
  div.innerHTML = `<div class="bubble">${content}</div><div class="time">${time}</div>`;
  box.appendChild(div);
  scrollChat();
}

function scrollChat() {
  const box = document.getElementById('chatBox');
  box.scrollTop = box.scrollHeight;
}

// ====== 推荐 ======
async function getRecommend() {
  const memberId = document.getElementById('recMemberId').value;
  const topK = document.getElementById('recTopK').value;
  const category = document.getElementById('recCategory').value;
  const output = document.getElementById('recOutput');

  output.className = 'output';
  output.innerHTML = '<span class="loading">⏳ 正在生成推荐...</span>';

  try {
    const r = await fetch(`${API}/api/v1/recommend`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ member_id: parseInt(memberId), top_k: parseInt(topK), category: category || null })
    });
    const data = await r.json();
    if (data.recommendations && data.recommendations.length) {
      let html = '🎯 **个性化推荐结果**\n\n';
      data.recommendations.forEach((rec, i) => {
        html += `${i+1}. **${rec.title || rec.course_title || '课程'}**\n`;
        if (rec.description) html += `   ${rec.description}\n`;
        if (rec.reason) html += `   💡 *${rec.reason}*\n`;
        html += '\n';
      });
      if (data.reason) html += `---\n📝 **推荐理由**\n${data.reason}`;
      output.innerHTML = html;
    } else {
      output.innerHTML = '暂无推荐结果';
    }
  } catch (err) {
    output.innerHTML = `<span class="error">❌ 请求失败: ${err.message}</span>`;
  }
}

// ====== 报告 ======
async function generateReport() {
  const rptType = document.getElementById('rptType').value;
  const memberId = document.getElementById('rptMemberId').value;
  const startDate = document.getElementById('rptStart').value;
  const endDate = document.getElementById('rptEnd').value;
  const output = document.getElementById('rptOutput');

  output.className = 'output';
  output.innerHTML = '<span class="loading">⏳ 正在生成报告（需要调用 DeepSeek API）...</span>';

  try {
    const r = await fetch(`${API}/api/v1/report/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        report_type: rptType,
        member_id: parseInt(memberId) || null,
        start_date: startDate,
        end_date: endDate
      })
    });
    const data = await r.json();
    let html = `## ${data.title || '学习报告'}\n\n`;
    html += `📅 **生成时间**: ${data.generated_at || ''}\n\n`;
    html += `---\n\n${data.content || '（无内容）'}`;
    output.innerHTML = html;
  } catch (err) {
    output.innerHTML = `<span class="error">❌ 请求失败: ${err.message}</span>`;
  }
}

// 预设示例问题
const sampleQuestions = [
  '请介绍一下三会一课制度',
  '习近平新时代中国特色社会主义思想的核心内容是什么',
  '党史上有哪些重要会议'
];
</script>
</body>
</html>
