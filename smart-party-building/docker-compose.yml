version: '3.8'

services:
  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: party-building-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: party_building
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - party-network

  # ---- Redis（会话管理和缓存） ----
  redis:
    image: redis:7-alpine
    container_name: party-building-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - party-network

  # ---- 应用服务（内置 Milvus Lite 向量数据库） ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: party-building-app
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: party_building
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      VECTOR_STORE_TYPE: milvus
      MILVUS_USE_LITE: true
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - party-network

networks:
  party-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
