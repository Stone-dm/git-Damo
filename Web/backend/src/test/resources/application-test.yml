spring:
  datasource:
    url: jdbc:h2:mem:party_school;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
  h2:
    console:
      enabled: false

app:
  jwt:
    secret: test-jwt-secret-key-that-is-long-enough-for-hs256
    expire-ms: 86400000
  agent:
    base-url: http://127.0.0.1:9
    shared-token:
